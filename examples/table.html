<!DOCTYPE html>

#lmf-canvas{width:800px;min-height:500px;display:flex;flex-direction:column;

-shrink:0;line-height:1">BW</div><div style="color:#f1f5f9;font-size:13px;white-space:nowrap">Bob Wilson</div></div><div style="flex:1;min-width:0;color:#94a3b8;font-size:13px;white-space:nowrap">bob@example.com</div><div style="width:100px;color:#94a3b8;font-size:13px;white-space:nowrap">Viewer</div><div style="display:flex;flex-direction:row;width:100px;justify-content:center"><div style="background:#7f1d1d;color:#f87171;font-size:11.0px;border-radius:10.0px;display:inline-flex;align-items:center;justify-content:center;padding:2px 10px;font-weight:600;white-space:nowrap;flex-shrink:0">Inactive</div></div></div><div style="display:flex;flex-direction:row;width:100%;padding:12.0px 16.0px 12.0px 16.0px;align-items:center"><div style="display:flex;flex-direction:row;width:200px;gap:10px;align-items:center"><div style="background:#14b8a6;font-size:11px;width:28px;height:28px;min-width:28px;border-radius:50%;color:#ffffff;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0;line-height:1">AL</div><div style="color:#f1f5f9;font-size:13px;white-space:nowrap">Alice Lee</div></div><div style="flex:1;min-width:0;color:#94a3b8;font-size:13px;white-space:nowrap">alice@example.com</div><div style="width:100px;color:#94a3b8;font-size:13px;white-space:nowrap">Admin</div><div style="display:flex;flex-direction:row;width:100px;justify-content:center"><div style="background:#064e3b;color:#4ade80;font-size:11.0px;border-radius:10.0px;display:inline-flex;align-items:center;justify-content:center;padding:2px 10px;font-weight:600;white-space:nowrap;flex-shrink:0">Active</div></div></div></div></div><div style="display:flex;flex-direction:row;width:100%;align-items:center;justify-content:space-between"><div style="color:#64748b;font-size:12px;white-space:nowrap">Showing 4 of 128 users</div><div style="display:flex;flex-direction:row;gap:8px"><div style="background:#334155;font-size:12.0px;border-radius:6.0px;display:flex;align-items:center;justify-content:center;padding:8px 16px;font-weight:600;cursor:pointer;white-space:nowrap;flex-shrink:0;color:#ffffff;border:none">Previous</div><div style="background:#6366f1;font-size:12.0px;border-radius:6.0px;display:flex;align-items:center;justify-content:center;padding:8px 16px;font-weight:600;cursor:pointer;white-space:nowrap;flex-shrink:0;color:#ffffff;border:none">Next</div></div></div></div></div>
<script>
(function(){
  var el=document.getElementById('lmf-canvas');
  function fit(){
    var s=window.innerWidth/800;
    el.style.transform='scale('+s+')';
    document.body.style.height=Math.ceil(s*el.scrollHeight)+'px';
  }
  fit();
  window.addEventListener('resize',fit);
})();
</script>
</body></html>
