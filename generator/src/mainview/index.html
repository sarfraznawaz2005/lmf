<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LMF Generator</title>
  <link rel="stylesheet" href="index.css">
  <link rel="stylesheet" href="settings.css">
</head>
<body>
  <div id="app">
    <!-- Main Content -->
    <main class="main-content">
      <!-- Header Toolbar -->
      <header class="toolbar">
        <div class="toolbar-left">
          <div class="app-title">
            <h1>LMF Generator</h1>
            <p>AI-powered LMF image generation</p>
          </div>
        </div>
        <div class="toolbar-right">
          <button id="settings-btn" class="btn btn-secondary">Settings</button>
          <button id="export-btn" class="btn btn-primary">Export</button>
        </div>
      </header>

    <!-- Main Preview Area -->
    <main class="preview-container">
      <div class="preview-header">
        <span class="preview-label">LIVE PREVIEW</span>
        <div class="preview-controls">
          <span id="preview-mode-badge" class="badge badge-success">SVG</span>
        </div>
      </div>

      <div class="preview-content">
        <!-- Conversational Response View -->
        <div id="conversation-view" class="preview-view hidden">
          <div id="conversation-content"></div>
        </div>

        <!-- SVG Preview (default) -->
        <div id="svg-preview" class="preview-view active">
          <div id="svg-container"></div>
        </div>

        <!-- LMF Code View -->
        <div id="lmf-code-view" class="preview-view hidden">
          <pre id="lmf-code"><code></code></pre>
        </div>

        <!-- Empty State -->
        <div id="empty-state" class="empty-state">
          <p>Type your request below to generate LMF...</p>
        </div>
      </div>
    </div>

    <!-- Chat Input Section -->
    <section class="chat-input-container">
      <!-- Error Message Display -->
      <div id="error-message" class="error-message hidden"></div>

      <div class="chat-input-wrapper">
        <div class="chat-input-row">
          <!-- Text Input with integrated Send button -->
          <div class="input-wrapper">
            <textarea id="prompt-input" placeholder="Create a modern login page with email and password fields..." rows="1" autofocus></textarea>
            <button id="send-btn" class="send-btn" title="Send (Enter)">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="5" y1="12" x2="19" y2="12"/>
                <polyline points="12 5 19 12 12 19"/>
              </svg>
            </button>
          </div>
        </div>
      </div>
    </section>
    </main>

    <!-- Status Bar -->
    <footer class="status-bar">
      <div class="status-left">
        <span id="status-text">Ready</span>
        <span id="token-count">Tokens: ~0</span>
      </div>
      <div class="status-right">
        <span id="provider-status">Provider: None</span>
        <span id="connection-badge" class="badge">Disconnected</span>
      </div>
    </footer>
    </main>

    <!-- Settings Modal -->
    <div id="settings-modal" class="modal hidden">
      <div class="modal-overlay"></div>
      <div class="modal-content">
        <div class="modal-header">
          <h2>Settings</h2>
          <button id="close-settings" class="icon-btn modal-close">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="18" y1="6" x2="6" y2="18"/>
              <line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>
        <div class="modal-body">
          <!-- Will be populated by settings screen -->
        </div>
      </div>
    </div>
  </div>

  <script src="index.js"></script>
</body>
</html>
